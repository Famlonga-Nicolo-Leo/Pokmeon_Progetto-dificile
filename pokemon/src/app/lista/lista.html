<div>
    @for (i of listapokemon; track i){
        <div (click)="selectPokemon(i)">
            <div style="border: 1px solid #ccc; padding: 10px ; width: 200px; text-align: center; cursor: pointer;">
                <h3>{{ i.name }}</h3>
                <p>{{ i.type }}</p>
                <img [src]="i.imageUrl" [alt]="i.name" style="width: 100%; height: auto;">
            </div>
        </div>
    }
    
</div>

@if (selectedPokemon) {
    <app-spec [p]="selectedPokemon"></app-spec>
}
